<!DOCTYPE html>
<html>

<head>
	<title>Simple Example</title>
	<style>
		canvas {
			border: #333 10px solid;
		}
	</style>
</head>

<body>
	<canvas id="myCanvas" width="550px" height="350px"></canvas>
	<script>
		var canvas = document.querySelector("#myCanvas");
		var context = canvas.getContext("2d");

		var xPos = -100;
		var yPos = 170;

		function update() {
			context.clearRect(0, 0, canvas.width, canvas.height);

			for (var i = 0; i < positions.length; i++) {
				var ratio = (i + 1) / positions.length;

				context.beginPath();
				context.arc(positions[i].x, positions[i].y, 50, 0, 2 * Math.PI, true);
				context.fillStyle = "rgba(204, 102, 153, " + ratio / 2 + ")";
				context.fill();
			}

			context.beginPath();
			context.arc(xPos, yPos, 50, 0, 2 * Math.PI, true);
			context.fillStyle = "#FF6A6A";
			context.fill();

			storeLastPosition(xPos, yPos);

			// update position
			if (xPos > 600) {
				xPos = -100;
			}
			xPos += 3;

			requestAnimationFrame(update);
		}

		var motionTrailLength = 10;
		var positions = [];

		function storeLastPosition(xPos, yPos) {
			// push an item
			positions.push({
				x: xPos,
				y: yPos
			});

			//get rid of first item
			if (positions.length > motionTrailLength) {
				positions.shift();
			}
		}

		update();
	</script>
</body>

</html>
